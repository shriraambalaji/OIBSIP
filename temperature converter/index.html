<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Thermal Converter</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>

<div class="converter">

    <div class="header">
        <h1>🌡 Temperature Converter</h1>
        <p>Convert between Celsius, Fahrenheit and Kelvin</p>
    </div>

    <div class="input-box">

        <input
            type="text"
            id="temperature"
            placeholder=" "
            inputmode="decimal">

        <label>Enter Temperature</label>

    </div>

    <div class="selectors">

        <div class="select-group">

            <label>From</label>

            <select id="fromUnit">
                <option>Celsius</option>
                <option>Fahrenheit</option>
                <option>Kelvin</option>
            </select>

        </div>

        <div class="select-group">

            <label>To</label>

            <select id="toUnit">
                <option>Fahrenheit</option>
                <option>Celsius</option>
                <option>Kelvin</option>
            </select>

        </div>

    </div>

    <button class="convert-btn">
        Convert Now
    </button>

    <div class="result-card warm">

        <h3>Result</h3>

        <div class="result-value">
            
        </div>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
